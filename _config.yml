# 網站基本設定
title: "Sun ny 的部落格"
author: "Sun ny"
email: hongkpng856@gmail.com
description: "分享科技、投資和生活品質提升的實用技巧"
baseurl: "/blog" # 如果部署在子路徑，請填寫，如 "/blog"
url: "https://hongkpng856-blip.github.io" # 網站完整 URL

# 社交媒體
social:
  name: Sun ny
  links:
    - https://github.com/hongkpng856-blip
    - https://t.me/Sun123890

# 建構設定
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 時區
timezone: Asia/Taipei

# 分頁設定
paginate: 5
paginate_path: "/page:num/"

# 排除檔案
exclude:
  - backup/
  - "*.sh"
  - "*.bak"
  - README.md
  - LICENSE

# 文章設定
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Sun ny"
      image: /assets/images/default-post.svg

# SEO 設定
lang: zh-TW
locale: zh_TW

# 顏色設定
colors:
  primary: "#1a237e"
  secondary: "#f5f5f5"
  accent: "#3949ab"