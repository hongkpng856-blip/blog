<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#1a237e"/>
  
  <!-- 裝飾圓形 -->
  <circle cx="700" cy="80" r="120" fill="#4caf50" opacity="0.3"/>
  <circle cx="650" cy="320" r="80" fill="#4caf50" opacity="0.2"/>
  <circle cx="100" cy="350" r="60" fill="#3949ab" opacity="0.4"/>
  
  <!-- 標題 -->
  <text x="50" y="100" fill="white" font-size="42" font-weight="bold" font-family="Arial, sans-serif">健康生活</text>
  <text x="50" y="150" fill="#4caf50" font-size="28" font-family="Arial, sans-serif">五個簡單習慣</text>
  
  <!-- 圖示：心形 -->
  <path d="M120 250 C120 220, 160 200, 180 230 C200 200, 240 220, 240 250 C240 290, 180 340, 180 340 C180 340, 120 290, 120 250" fill="#4caf50" opacity="0.8"/>
  
  <!-- 圖示：葉子 -->
  <ellipse cx="320" cy="280" rx="40" ry="60" fill="#4caf50" opacity="0.6" transform="rotate(-20 320 280)"/>
  <line x1="320" y1="220" x2="320" y2="340" stroke="#f5f5f5" stroke-width="3"/>
  
  <!-- 圖示：太陽 -->
  <circle cx="480" cy="260" r="40" fill="#f5f5f5"/>
  <g stroke="#f5f5f5" stroke-width="3">
    <line x1="480" y1="200" x2="480" y2="180"/>
    <line x1="480" y1="320" x2="480" y2="340"/>
    <line x1="420" y1="260" x2="400" y2="260"/>
    <line x1="540" y1="260" x2="560" y2="260"/>
    <line x1="440" y1="220" x2="425" y2="205"/>
    <line x1="520" y1="220" x2="535" y2="205"/>
    <line x1="440" y1="300" x2="425" y2="315"/>
    <line x1="520" y1="300" x2="535" y2="315"/>
  </g>
  
  <!-- 底部文字 -->
  <text x="800" y="390" fill="#f5f5f5" font-size="14" font-family="Arial, sans-serif" text-anchor="end">blog</text>
</svg>
