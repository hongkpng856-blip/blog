<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#1a237e"/>
  
  <!-- 漸層效果 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949ab;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- 背景圓形裝飾 -->
  <circle cx="650" cy="100" r="150" fill="#3949ab" opacity="0.3"/>
  <circle cx="150" cy="350" r="120" fill="#3949ab" opacity="0.2"/>
  
  <!-- AI 大腦/網絡圖案 -->
  <g transform="translate(400, 200)">
    <!-- 中心節點 -->
    <circle cx="0" cy="0" r="40" fill="url(#grad2)"/>
    <text x="0" y="8" text-anchor="middle" fill="white" font-size="24" font-weight="bold">AI</text>
    
    <!-- 連接線 -->
    <line x1="0" y1="0" x2="-80" y2="-60" stroke="#4caf50" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="80" y2="-60" stroke="#4caf50" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="-100" y2="30" stroke="#4caf50" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="100" y2="30" stroke="#4caf50" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="-60" y2="80" stroke="#4caf50" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="60" y2="80" stroke="#4caf50" stroke-width="2" opacity="0.7"/>
    
    <!-- 外圍節點 -->
    <circle cx="-80" cy="-60" r="20" fill="#f5f5f5"/>
    <circle cx="80" cy="-60" r="20" fill="#f5f5f5"/>
    <circle cx="-100" cy="30" r="20" fill="#f5f5f5"/>
    <circle cx="100" cy="30" r="20" fill="#f5f5f5"/>
    <circle cx="-60" cy="80" r="20" fill="#f5f5f5"/>
    <circle cx="60" cy="80" r="20" fill="#f5f5f5"/>
  </g>
  
  <!-- 標題文字 -->
  <text x="50" y="60" fill="white" font-size="28" font-weight="bold">AI 自動化</text>
  <text x="50" y="100" fill="#4caf50" font-size="22">改變未來工作模式</text>
  
  <!-- 底部裝飾線 -->
  <rect x="50" y="350" width="200" height="4" fill="url(#grad2)"/>
  
  <!-- 圖示 - 齒輪（代表自動化） -->
  <g transform="translate(700, 320)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#4caf50" stroke-width="3"/>
    <circle cx="0" cy="0" r="15" fill="#4caf50"/>
    <!-- 齒輪齒 -->
    <rect x="-5" y="-45" width="10" height="20" fill="#4caf50"/>
    <rect x="-5" y="25" width="10" height="20" fill="#4caf50"/>
    <rect x="-45" y="-5" width="20" height="10" fill="#4caf50"/>
    <rect x="25" y="-5" width="20" height="10" fill="#4caf50"/>
  </g>
</svg>
