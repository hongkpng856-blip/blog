<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3949ab;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bcd4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="200" height="200" fill="url(#bg-gradient)"/>
  
  <!-- 裝飾元素 -->
  <circle cx="30" cy="30" r="40" fill="white" opacity="0.1"/>
  <circle cx="170" cy="170" r="50" fill="white" opacity="0.1"/>
  <circle cx="170" cy="30" r="30" fill="white" opacity="0.05"/>
  
  <!-- 主要圖示 -->
  <g filter="url(#shadow)">
    <circle cx="100" cy="100" r="60" fill="#1a237e" opacity="0.8"/>
<circle cx="100" cy="100" r="40" fill="#3949ab" opacity="0.6"/>
<circle cx="100" cy="100" r="20" fill="#00bcd4"/>
<line x1="100" y1="40" x2="100" y2="160" stroke="#00bcd4" stroke-width="2" opacity="0.5"/>
<line x1="40" y1="100" x2="160" y2="100" stroke="#00bcd4" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- 標題文字 -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">
    AI 自動化如何改變未來工作模式
  </text>
</svg>