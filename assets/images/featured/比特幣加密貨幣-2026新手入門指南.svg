<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="200" height="200" fill="url(#bg-gradient)"/>
  
  <!-- 裝飾元素 -->
  <circle cx="30" cy="30" r="40" fill="white" opacity="0.1"/>
  <circle cx="170" cy="170" r="50" fill="white" opacity="0.1"/>
  <circle cx="170" cy="30" r="30" fill="white" opacity="0.05"/>
  
  <!-- 主要圖示 -->
  <g filter="url(#shadow)">
    <path d="M40 140 L80 100 L100 120 L140 60 L160 80" stroke="#4caf50" stroke-width="4" fill="none"/>
<circle cx="40" cy="140" r="8" fill="#1565c0"/>
<circle cx="80" cy="100" r="8" fill="#1565c0"/>
<circle cx="100" cy="120" r="8" fill="#1565c0"/>
<circle cx="140" cy="60" r="8" fill="#4caf50"/>
<circle cx="160" cy="80" r="8" fill="#4caf50"/>
<rect x="30" y="150" width="140" height="20" fill="#1565c0" opacity="0.3" rx="5"/>
  </g>
  
  <!-- 標題文字 -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">
    比特幣加密貨幣 2026：新手入門指南
  </text>
</svg>