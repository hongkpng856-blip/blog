<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% raw %}{% if page.title %}{{ page.title }} - {% endif %}{% endraw %}{{ site.title }}</title>
<meta name="description" content="{% raw %}{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}{% endraw %}">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- 自定義 CSS -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<!-- 字體圖標 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Favicon -->
<link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
