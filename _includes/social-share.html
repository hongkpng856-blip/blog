<script>
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(function() {
    alert('連結已複製到剪貼板！');
  }, function() {
    // 備用方案
    var textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    document.execCommand("Copy");
    textArea.remove();
    alert('連結已複製到剪貼板！');
  });
}
</script>
