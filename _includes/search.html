<!-- 搜索框 -->
<div class="card mb-4">
  <div class="card-header">
    <i class="fas fa-search me-2"></i>搜索文章
  </div>
  <div class="card-body">
    <div class="search-box">
      <input type="text" id="search-input" class="form-control mb-2" placeholder="輸入關鍵字...">
      <button id="search-btn" class="btn btn-primary w-100">搜索</button>
    </div>
    <div id="search-results" class="mt-3"></div>
  </div>
</div>

<!-- Simple-Jekyll-Search 模板 -->
<script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var searchInput = document.getElementById('search-input');
  var searchResults = document.getElementById('search-results');
  
  if (searchInput) {
    var sjs = SimpleJekyllSearch({
      searchInput: searchInput,
      resultsContainer: searchResults,
      json: '{{ "/search.json" | relative_url }}',
      searchResultTemplate: '<li class="list-group-item"><a href="{url}" title="{title}">{title}</a></li>',
      noResultsText: '<p class="text-muted">沒有找到相關文章</p>',
      limit: 10,
      fuzzy: false
    });
  }
});
</script>
