{% comment %}
JSON-LD 結構化數據
自動為文章頁面生成 Schema.org 結構化數據
{% endcomment %}

{% if page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ page.title | escape }}",
  "description": "{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}",
  "image": "{% if page.featured_image %}{{ page.featured_image | absolute_url }}{% else %}{{ '/assets/images/avatar.svg' | absolute_url }}{% endif %}",
  "author": {
    "@type": "Person",
    "name": "{{ site.author | escape }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.title | escape }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ '/assets/images/avatar.svg' | absolute_url }}"
    }
  },
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.date | date_to_xmlschema }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "keywords": "{% if page.tags %}{{ page.tags | join: ', ' | escape }}{% endif %}",
  "articleSection": "{% if page.categories %}{{ page.categories | first | escape }}{% endif %}",
  "wordCount": {{ content | number_of_words }},
  "inLanguage": "zh-TW"
}
</script>
{% elsif page.layout == 'default' or page.layout == 'home' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title | escape }}",
  "description": "{{ site.description | escape }}",
  "url": "{{ site.url }}{{ site.baseurl }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ site.url }}{{ site.baseurl }}/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  },
  "inLanguage": "zh-TW"
}
</script>
{% endif %}

{% comment %}
Breadcrumb 結構化數據
{% endcomment %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "首頁",
      "item": "{{ site.url }}{{ site.baseurl }}/"
    }
    {% if page.layout == 'post' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% elsif page.layout == 'category' or page.layout == 'tag' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% endif %}
  ]
}
</script>
